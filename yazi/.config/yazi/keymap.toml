[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "cd ~/Pictures"
desc = "go to Pictures"

[[mgr.prepend_keymap]]
on   = [ "g", "v" ]
run  = "cd ~/Videos"
desc = "go to Videos"

[[mgr.prepend_keymap]]
on   = [ "g", "s" ]
run  = "cd /mnt/668E28458E280FDB/Series"
desc = "go to Series"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = "cd /mnt/668E28458E280FDB/Movies"
desc = "go to Movies"

[[mgr.prepend_keymap]]
on   = [ "g", "D" ]
run  = "cd /mnt/668E28458E280FDB/Downloads"
desc = "go to New Volume/Downloads"

[[mgr.prepend_keymap]]
on   = [ "g", "n" ]
run  = "cd /mnt/668E28458E280FDB"
desc = "go to New Volume"

[[mgr.prepend_keymap]]
on   = [ "g", "w" ]
run  = "cd ~/Documents/code/work"
desc = "go to Work"

[[mgr.prepend_keymap]]
on   = [ "g", "C" ]
run  = "cd ~/Documents/code"
desc = "go to Code"

[[mgr.prepend_keymap]]
on = [ "M" ]
run = "plugin bookmarks save"
desc = "Save current position as a bookmark"

[[mgr.prepend_keymap]]
on = [ "'" ]
run = "plugin bookmarks jump"
desc = "Jump to a bookmark"

[[mgr.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin bookmarks delete"
desc = "Delete a bookmark"

[[mgr.prepend_keymap]]
on = [ "b", "D" ]
run = "plugin bookmarks delete_all"
desc = "Delete all bookmarks"

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char"
desc = "Jump to char"

[[input.prepend_keymap]]
on   = [ "<S-Esc>" ]
run  = "close"
desc = "Cancel input"
